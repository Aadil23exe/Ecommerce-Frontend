<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{background:#f6f7f9;}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,0.06);}
.logo-image{height:48px;}
.nav{display:flex;gap:25px;}
.nav a{text-decoration:none;color:#333;font-weight:500;}
.nav a:hover{color:#2563eb;}
.container{max-width:400px;margin:70px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.06);}
.container h2{text-align:center;margin-bottom:20px;}
.input-group{margin-bottom:15px;position:relative;}
.input-group input{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;}
.input-group i{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;}
.error{font-size:13px;color:red;margin-top:3px;}
button{width:100%;padding:10px;background:#7363ff;color:#fff;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#5a4de0;}
.extra{display:flex;justify-content:space-between;font-size:14px;margin-top:10px;}
.extra a{text-decoration:none;color:#2563eb;}
@media(max-width:500px){.container{width:90%;}}
</style>
<script type="module">

import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

window.login = function () {

  let valid = true;

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  document.querySelectorAll(".error").forEach(e => e.innerText = "");

  if(email === ""){
    document.getElementById("loginEmailError").innerText = "Email required";
    valid = false;
  }

  if(password === ""){
    document.getElementById("loginPassError").innerText = "Password required";
    valid = false;
  }

  if(!valid) return;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {

    alert("Login Successful");

    window.location.href = "index.html";

  })
  .catch((error) => {

    document.getElementById("loginPassError").innerText = error.message;

  });

};

</script>
</head>
<body>

<header>
<img src="assets/logo.png" class="logo-image">
<div class="nav">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</header>

<div class="container">
<h2>Login</h2>

<div class="input-group">
<input type="email" id="loginEmail" placeholder="Email">
<div class="error" id="loginEmailError"></div>
</div>

<div class="input-group">
<input type="password" id="loginPassword" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword('loginPassword',this)"></i>
<div class="error" id="loginPassError"></div>
</div>

<button onclick="login()">Login</button>

<div class="extra">
<a href="#">Forgot Password?</a>
<a href="signup.html">Sign Up</a>
</div>
</div>

<script>
function togglePassword(id,icon){
const input=document.getElementById(id);
if(input.type==="password"){input.type="text";icon.classList.replace("fa-eye","fa-eye-slash");}
else{input.type="password";icon.classList.replace("fa-eye-slash","fa-eye");}
}


</script>

</body>
</html>
