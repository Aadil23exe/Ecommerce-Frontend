<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/app.js" defer></script>
    <style>
        *
        {
            box-sizing: border-box;
            margin: 0;
            padding: 5px;
            font-family: Arial, sans-serif;
        }
        .container
        {
            width: 90%;
            margin: auto;
            overflow: hidden;
        }
        .row
        {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card
        {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            width: 270px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover
        {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-5px);
            transition: all 0.3s ease;
            border:#5a4de0 1px solid;
        }

        .card img
        {
            max-width: 100%;
            height: 200px;
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 0.9em;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            overflow: hidden;
        }

        .card span
        {
            font-size: 1.2em;
            color: #333;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .card button
        {
            padding: 10px 15px;
            background-color: #7363ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            margin-top: auto;
        }

        .card button:hover
        {
            background-color: #5a4de0;
        }
        .toast{
position:fixed;
bottom:30px;
right:30px;
background:#4caf50;
color:#fff;
padding:14px 22px;
border-radius:8px;
font-weight:600;
opacity:0;
transform:translateY(20px);
transition:.35s ease;
z-index:9999;
box-shadow:0 6px 16px rgba(0,0,0,.2);
}

.toast.show{
opacity:1;
transform:translateY(0);
}
        
    </style>
    <script>
        
        fetch('https://fakestoreapi.com/products')
        .then(response => response.json())
        .then(data => {
            displayProducts(data);
        });
        
            function displayProducts(data) {
            data.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.title}" loading="lazy">
                    <h2>${product.title}</h2>
                    <span>$${product.price}</span>
                    <button onclick="event.stopPropagation(); addToCart(${product.id}, true)">
                        Add to Cart
                    </button>
                `;

                card.onclick = () => {
                    localStorage.setItem(
                        "selected_product",
                        JSON.stringify(product)
                    );
                    window.location.href = "productdetailpage.html";
                };

                document.querySelector('.row').appendChild(card);
            });
        }
            card.onclick = () => {
            localStorage.setItem(
                "selected_product",
                JSON.stringify(product)
            );
            window.location.href = "productdetailpage.html";
        };
    


    </script>
    <title>Products</title>
</head>
<body>
    <div class="container">
        <div class="row"></div>
        <div id="toast" class="toast"></div>
    </div>
</body>
</html>
